<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Convite de Casamento - Marilza & Alexandre</title>

    <meta name="theme-color" content="#f5f5f3">

    <!-- Biblioteca que traz os desenhos dos ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* =========================
           CONFIGURAÇÕES GERAIS
        ========================== */
        body {
            margin: 0;
            padding: 20px 0;
            background: #f5f5f3;
            font-family: Cinzel;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* =========================
           CONTAINER DO CONVITE (AJUSTADO PARA PC E CELULAR)
        ========================== */
        .convite-container {
            width: 92%;
            max-width: 420px;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            line-height: 0;
        }

        /* Regra especial para telas grandes (PC): impede o convite de estourar a altura da tela */
        @media (min-height: 600px) and (min-width: 450px) {
            .convite-container {
                max-width: calc((100vh - 40px) * 0.56); /* Mantém a proporção do convite baseada na altura da tela */
                height: calc(100vh - 40px);
            }
        }

        /* =========================
           IMAGEM
        ========================== */
        .arte-convite {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* =========================
           BOTÃO MÚSICA
        ========================== */
        .music-control {
            position: fixed;
            top: 20px;
            right: calc(50% - 190px);
            z-index: 999;
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(109,128,101,0.9);
            color: white;
            font-size: 18px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.18);
            transition: 0.3s;
        }

        .music-control:hover {
            transform: scale(1.05);
        }

        @media(max-width:450px) {
            .music-control {
                right: 20px;
            }
        }

        /* =========================
           GRADE DE ÍCONES (ALINHAMENTO SEGURO)
        ========================== */
        .botoes-overlay {
            position: absolute;
            bottom: 2.0%;
            left: 11%;
            width: 78%;
            height: 9.0%;
            z-index: 100;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4%;
        }

        .botao-link {
            position: relative;
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            cursor: pointer;
            color: #6d8065;
            -webkit-tap-highlight-color: rgba(109, 128, 101, 0.15);
        }

        .botao-link i {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .botao-link span {
            position: absolute;
            top: 60%; 
            left: 50%;
            transform: translateX(-50%);
            width: 110%;
            font-size: 5.8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            line-height: 1.1;
            text-align: center;
            display: block;
        }

        .botao-link:active {
            transform: scale(0.95);
        }

        /* =========================
           EFEITO CAINDO
        ========================== */
        .brasao-caindo {
            position: absolute;
            background: url('https://i.ibb.co/HTZFvxkp/Pngtree-lens-flare-white-sparkling-light-8415861.png') no-repeat center;
            background-size: contain;
            pointer-events: none;
            animation: cair linear infinite;
            z-index: 5;
            opacity: 1.0;
        }

        @keyframes cair {
            0% {
                top: -60px;
                transform: translateX(0) rotate(0deg);
                opacity: 1.0;
            }
            10% { opacity: 0.50; }
	    20% { opacity: 0.50; }
	    30% { opacity: 0.50; }
	    40% { opacity: 0.50; }
            50% { opacity: 0.50; }
            90% { opacity: 0.50; }
            100% {
                top: 100%;
                transform: translateX(60px) rotate(120deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- BOTÃO MÚSICA -->
    <button class="music-control" id="audioBtn" onclick="toggleAudio()">
        <i class="fa-solid fa-volume-xmark" id="audioIcon"></i>
    </button>

    <!-- ÁUDIO -->
    <audio id="musicaNoivos" loop>
        <source src="https://files.catbox.moe/xobcaj.mp3" type="audio/mpeg">
    </audio>

    <!-- CONVITE -->
    <div class="convite-container">

        <!-- EFEITOS -->
        <div class="brasao-caindo" style="left:10%; width:40px; height:40px; animation-duration:14s; animation-delay:0s;"></div>
        <div class="brasao-caindo" style="left:50%; width:30px; height:30px; animation-duration:18s; animation-delay:4s;"></div>
        <div class="brasao-caindo" style="left:80%; width:45px; height:45px; animation-duration:15s; animation-delay:2s;"></div>

        <!-- IMAGEM ORIGINAL -->
        <img src="https://i.ibb.co/LXLbjZHt/Convite-de-Casamento-Marilza-e-Alexandre.png" alt="Convite Marilza e Alexandre" class="arte-convite">

        <!-- BOTÕES E LEGENDAS TOTALMENTE ALINHADOS -->
        <div class="botoes-overlay">
            
            <!-- Ícone 1: Cerimônia -->
            <a href="https://www.google.com/maps/search/santo+antonio+e+almas/@-10.6868678,-37.4288588,17z/data=!3m1!4b1?entry=tts&g_ep=EgoyMDI2MDQwMS4wIPu8ASoASAFQAw%3D%3D&skid=4b3852ef-0235-4ee8-a87f-368986aa5812" target="_blank" class="botao-link" title="Cerimônia">
                <i class="fa-solid fa-church"></i>
                <span>Cerimônia</span>
            </a>

            <!-- Ícone 2: Recepção -->
            <a href="https://drive.google.com/file/d/1VOe8zJ-W9N8fJGaw-fCY6hJ1Wmc0kvdE/view" target="_blank" class="botao-link" title="Recepção">
                <i class="fa-solid fa-champagne-glasses"></i>
                <span>Recepção</span>
            </a>

            <!-- Ícone 3: Confirmação de Presença -->
            <a href="https://api.whatsapp.com/send/?phone=5579999089845&text=Ol%C3%A1%2C+gostaria+de+confirmar+presen%C3%A7a+no+casamento+M%7CA%21&type=phone_number&app_absent=0" target="_blank" class="botao-link" title="Confirmar Presença">
                <i class="fa-solid fa-calendar-check"></i>
                <span>Confirmação<br>de Presença</span>
            </a>

            <!-- Ícone 4: Sugestão de Presente -->
            <a href="https://drive.google.com/file/d/159Y7h1jDgu-w6yL3Y1a1KMd1kSJrpA9q/view" target="_blank" class="botao-link" title="Lista de Presentes">
                <i class="fa-solid fa-gift"></i>
                <span>Sugestão<br>de Presente</span>
            </a>
            
        </div>

    </div>

    <!-- SCRIPT -->
    <script>
        var audio = document.getElementById("musicaNoivos");
        var icon = document.getElementById("audioIcon");

        function toggleAudio(){
            if(audio.paused){
                audio.play();
                icon.className = "fa-solid fa-volume-high";
            }else{
                audio.pause();
                icon.className = "fa-solid fa-volume-xmark";
            }
        }
    </script>

</body>

</html>
